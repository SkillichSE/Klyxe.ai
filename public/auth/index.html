<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Klyxe</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <lex-sidebar></lex-sidebar>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Welcome to Klyxe</h1>
        <p>Sign in to save preferences and track AI benchmarks</p>
      </div>

      <div class="auth-content">

        <!-- messages -->
        <div id="auth-error" class="auth-message error"></div>
        <div id="auth-success" class="auth-message success"></div>

        <!-- logged out: forms -->
        <div id="auth-forms">
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="signin">Sign In</button>
            <button class="auth-tab" data-tab="signup">Create Account</button>
          </div>

          <!-- sign in form -->
          <form id="signin-form" class="auth-form active">
            <div class="form-group">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="signin-btn" class="auth-submit-btn">Sign In</button>
          </form>

          <!-- sign up form -->
          <form id="signup-form" class="auth-form">
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="signup-btn" class="auth-submit-btn">Create Account</button>
          </form>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <button id="github-btn" class="github-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <!-- logged in: user info -->
        <div id="user-info" class="user-info">
          <div id="user-avatar" class="user-avatar"></div>
          <div id="user-email" class="user-email"></div>
          <button id="logout-btn" class="auth-submit-btn">Sign Out</button>
        </div>

      </div>

      <div class="auth-footer">
        <p>By signing in, you agree to our <a href="../about.html">Terms of Service</a></p>
      </div>
    </div>
  </main>

  <script src="../sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.supabase = supabase</script>
  <script src="../config.js"></script>
  <script src="../auth.js"></script>
</body>
</html>
